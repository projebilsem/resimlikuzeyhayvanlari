<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kutup Maceraları</title>

    <!-- BrowserFS hatasını çözmek için bu kütüphane şarttır -->
    <script src="https://pygame-web.github.io/cdn/0.9.3/browserfs.min.js"></script>

    <!-- Pygbag çekirdek scripti - gerekli öznitelikler (data-os gibi) eklendi -->
    <script src="https://pygame-web.github.io/cdn/0.9.3/pythons.js" 
            type="module" id="site" 
            data-python="python3.12" 
            data-os="vtx,snd,gui"
            async defer>
    </script>

    <style>
        body {
            background-color: #2c3e50;
            color: white;
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        #canvas {
            border: 4px solid #34495e;
            background-color: black;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            max-width: 95vw;
            max-height: 85vh;
            cursor: default;
        }
        #infobox {
            position: absolute;
            background: rgba(44, 62, 80, 0.9);
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            z-index: 100;
            border: 2px solid #3498db;
        }
        .hidden { display: none !important; }
        
        #status-text {
            color: #3498db;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="infobox">
        <h2 id="status-title">Kutup Maceraları</h2>
        <p id="status-text">Yükleniyor, lütfen bekleyin...</p>
        <div id="progress-bar" style="width: 200px; height: 10px; background: #34495e; margin: 10px auto; border-radius: 5px; overflow: hidden;">
            <div id="progress-fill" style="width: 0%; height: 100%; background: #3498db; transition: width 0.3s;"></div>
        </div>
    </div>

    <!-- Oyunun çizileceği alan -->
    <canvas class="emscripten" id="canvas" width="1280" height="720" oncontextmenu="event.preventDefault()" tabindex="1"></canvas>

    <script type="application/javascript">
        // Pygbag konfigürasyonu - Güvenlik hatalarını önlemek için düzenlendi
        window.config = {
            archive: "kutup.maceralari",
            gui_debug: 3,
            fb_width: 1280,
            fb_height: 720,
            _sdl2: "canvas",
            user_canvas: 0,
            user_canvas_managed: 0,
            ume_block: 1 // Kullanıcı etkileşimi bekleyerek ses sorunlarını önler
        };

        // BrowserFS ve Python yükleme takibi
        function custom_postrun() {
            const info = document.getElementById('infobox');
            if (info) info.classList.add('hidden');
            console.log("Python ve BrowserFS başarıyla yüklendi.");
        }

        // Hata ayıklama ve ilerleme çubuğu simülasyonu
        let progress = 0;
        const interval = setInterval(() => {
            if (progress < 90) {
                progress += Math.random() * 10;
                const fill = document.getElementById('progress-fill');
                if (fill) fill.style.width = progress + "%";
            }
        }, 500);
    </script>

    <!-- Başlatıcı Python Kodu -->
    <script type="text/python">
import asyncio
import platform
import embed

async def main():
    # Yükleme ekranını JS üzerinden kapat
    platform.window.custom_postrun()
    print("Oyun döngüsü hazır.")
    
    # Oyun kodunuz burada başlayacak
    # main.py dosyanız paket içindeyse Pygbag onu otomatik çalıştıracaktır.

asyncio.run(main())
    </script>

</body>
</html>
