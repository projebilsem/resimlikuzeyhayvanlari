<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>Kutup Maceraları</title>
  <link rel="icon" type="image/png" href="favicon.png" sizes="16x16" />

  <script>
    const config = {
      xtermjs: "1",
      _sdl2: "canvas",
      user_canvas: 0,
      user_canvas_managed: 0,
      gui_divider: 2,
      ume_block: 0,
      can_close: 0,
      archive: "kutup.maceralari",
      gui_debug: 0,
      cdn: "https://pygame-web.github.io/cdn/0.9.3/",
      autorun: 1,
      PYBUILD: "3.12",
      fb_ar: 1.77,
      fb_width: "1280",
      fb_height: "720"
    };

    function show_infobox() {
      const infobox = document.getElementById("infobox");
      if (!infobox) return;
      infobox.style.display = "block";
      const w = infobox.offsetWidth;
      const h = infobox.offsetHeight;
      infobox.style.left = (window.innerWidth - w) / 2 + "px";
      infobox.style.top = (window.innerHeight - h) / 2 + "px";
    }

    function hide_infobox() {
      const infobox = document.getElementById("infobox");
      if (infobox) infobox.style.display = "none";
    }
  </script>

  <style>
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: powderblue;
      font-family: Arial, sans-serif;
    }

    #transfer {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      background: rgba(255,255,255,0.55);
      z-index: 20;
    }

    #status {
      font-weight: bold;
      color: rgb(90, 90, 90);
      font-size: 18px;
    }

    #progress {
      height: 18px;
      width: min(320px, 80vw);
    }

    #infobox {
      position: fixed;
      background: rgba(20, 77, 120, 0.92);
      color: #fff;
      font-weight: bold;
      padding: 12px 24px;
      border-radius: 12px;
      z-index: 30;
      display: none;
      box-shadow: 0 8px 24px rgba(0,0,0,0.18);
    }

    canvas.emscripten {
      border: 0;
      background-color: transparent;
      width: 100%;
      height: 100%;
      padding: 0;
      margin: 0;
      position: absolute;
      inset: 0;
      z-index: 5;
      display: block;
    }

    .bottomright {
      position: absolute;
      top: 40%;
      right: 0;
    }

    .trinfo {
      position: relative;
      right: 0;
      border: 1px solid black;
    }

    .framed {
      position: relative;
      top: 150px;
      right: 10px;
      border: 1px solid black;
    }

    #pyconsole,
    #system,
    #box,
    #dlg {
      display: none;
    }
  </style>

  <script src="https://pygame-web.github.io/cdn/0.9.3/browserfs.min.js"></script>
</head>
<body>
  <div id="transfer" align="center">
    <div class="emscripten" id="status">Yükleniyor...</div>
    <div class="emscripten">
      <progress value="0" max="100" id="progress"></progress>
    </div>
  </div>

  <canvas class="emscripten" id="canvas" width="1280" height="720" oncontextmenu="event.preventDefault()" tabindex="1"></canvas>
  <canvas class="emscripten" id="canvas3d" width="1280" height="720" oncontextmenu="event.preventDefault()" tabindex="1" hidden></canvas>

  <div id="infobox">Oyun hazırlanıyor...</div>
  <div id="html"></div>

  <div id="crt" class="bottomright">
    <div id="system" hidden>
      <div class="button-container">
        <button id="aiostop" disabled>AIO ⏏︎</button>
        <button id="aiopaused_true" disabled>AIO ■</button>
        <button id="aiopaused_false" disabled>AIO ▶</button>
        <button id="pygame_mixer_music_pause" disabled>Music ■</button>
      </div>

      <div class="button-container">
        <div id="load_min">min</div>
        <div id="load_avg">avg</div>
        <div id="load_max">max</div>
        <button id="load_rst" disabled>RESET</button>
      </div>

      <div id="level">(battery level unknown)</div>
      <div id="stateBattery">(charging state unknown)</div>
    </div>

    <div id="box" class="emscripten_border" hidden="true">
      <div id="info" class="trinfo"></div>
      <iframe
        id="iframe"
        class="framed"
        name="iframe"
        width="470px"
        height="90%"
        allowtransparency="true"
        style="z-index: 10; background: #FFFFFF;"
        frameborder="1"
        allowfullscreen="true"
        webkitallowfullscreen="true"
        msallowfullscreen="true"
        mozallowfullscreen="true"
        sandbox="allow-same-origin allow-top-navigation allow-scripts allow-pointer-lock"
        allow="autoplay; fullscreen *; geolocation; microphone; camera; midi; monetization; xr-spatial-tracking; gamepad; gyroscope; accelerometer; xr; cross-origin-isolated"
        src="https://pygame-web.github.io/cdn/0.9.3/empty.html"
        scrolling="yes">
      </iframe>
    </div>
  </div>

  <div id="dlg" hidden>
    <input type="file" id="dlg_multifile" multiple accept="image/*" />
    <label for="dlg_multifile">Dosya seç</label>
  </div>

  <div id="pyconsole">
    <div id="terminal" tabindex="1" align="left"></div>
  </div>

  <script type="module" id="site" data-python="python3.12" data-LINES="42" data-COLUMNS="132" data-os="vtx,snd,gui">
import sys
import asyncio
import platform
from pathlib import Path

print("""
Loading kutup.maceralari from kutup.maceralari.apk
Pygbag Version : 0.9.3
Python : 3.12
""")

async def custom_site():
    import embed

    platform.document.body.style.background = "#b0e0e6"

    if hasattr(platform.window, "transfer"):
        platform.window.transfer.hidden = True

    if hasattr(platform.window, "canvas"):
        platform.window.canvas.style.visibility = "visible"

    bundle = "kutup.maceralari"
    appdir = Path(f"/data/data/{bundle}")
    appdir.mkdir(parents=True, exist_ok=True)

    try:
        if platform.window.location.host.find('.itch.zone') > 0:
            import zipfile
            async with platform.fopen("kutup.maceralari.apk", "rb") as archive:
                with zipfile.ZipFile(archive) as zip_ref:
                    zip_ref.extractall(appdir.as_posix())
        else:
            import tarfile
            async with platform.fopen("kutup.maceralari.tar.gz", "rb") as archive:
                tar = tarfile.open(fileobj=archive, mode="r:gz")
                tar.extractall(path=appdir.as_posix())
                tar.close()
    except Exception as e:
        print("Arşiv açılırken hata:", e)
        if hasattr(platform.window, "infobox"):
            platform.window.infobox.innerText = f"Yükleme hatası: {e}"
        raise

    platform.run_main(PyConfig, loaderhome=appdir / "assets", loadermain=None)

    while embed.counter() < 0:
        await asyncio.sleep(0.1)

    main = appdir / "assets" / "main.py"
    __import__(__name__).__file__ = str(main)

    if hasattr(platform.window, "infobox"):
        platform.window.infobox.innerText = "Oyun başlatılıyor..."

    try:
        await TopLevel_async_handler.start_toplevel(platform.shell, console=False)
        await shell.source(main)
    except Exception as e:
        print("main.py çalıştırılırken hata:", e)
        if hasattr(platform.window, "infobox"):
            platform.window.infobox.innerText = f"Başlatma hatası: {e}"
        raise

    if hasattr(platform.window, "infobox"):
        platform.window.infobox.style.display = "none"

    if hasattr(platform.window, "transfer"):
        platform.window.transfer.hidden = True

    platform.window.config.gui_divider = 1
    platform.window.window_resize()
    print("default.tmpl: done")
    shell.interactive()

asyncio.run(custom_site())
  </script>

  <script>
    globalThis.__canvas_resized = (self, ecw, ech) => {
      console.warn("canvas resized", self, ecw, ech);
    };

    async function custom_onload(debug_hidden) {
      console.log("custom_onload");
      const pyconsole = document.getElementById("pyconsole");
      const system = document.getElementById("system");
      const transfer = document.getElementById("transfer");
      const info = document.getElementById("info");
      const box = document.getElementById("box");

      if (pyconsole) pyconsole.hidden = debug_hidden;
      if (system) system.hidden = debug_hidden;
      if (transfer) transfer.hidden = false;
      if (info) info.hidden = debug_hidden;
      if (box) box.hidden = debug_hidden;

      show_infobox();
    }

    function custom_prerun() {
      console.log("custom_prerun");
      show_infobox();
    }

    function custom_postrun() {
      console.log("custom_postrun");
      hide_infobox();
      const transfer = document.getElementById("transfer");
      if (transfer) transfer.style.display = "none";
    }

    function debug() {
      if (window.python?.config) {
        window.python.config.debug = true;
      }
      custom_onload(false);
      if (window.Module?.PyRun_SimpleString) {
        Module.PyRun_SimpleString("shell.uptime()");
      }
      if (window.window_resize) {
        window_resize();
      }
    }

    function info_inline(data) {
      const info = document.getElementById("info");
      if (info) info.innerHTML = data;
    }

    function info_online(url) {
      fetch(url)
        .then((response) => response.text())
        .then((html) => info_inline(html))
        .catch((error) => console.warn(error));
    }

    function frame_online(url) {
      window.frames["iframe"].location = url;
    }

    window.addEventListener("load", () => {
      show_infobox();
      const canvas = document.getElementById("canvas");
      if (canvas) canvas.focus();
    });
  </script>
</body>
</html>
