<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kutup Maceraları</title>

    <script src="https://pygame-web.github.io/cdn/0.9.3/browserfs.min.js"></script>
    <script src="https://pygame-web.github.io/cdn/0.9.3/pythons.js" 
            type="module" id="site" 
            data-python="python3.12" 
            data-os="vtx,snd,gui"
            async defer>
    </script>

    <style>
        body { background-color: #0f172a; color: #f8fafc; margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: sans-serif; }
        #canvas { border: 3px solid #334155; background-color: #000; display: none; image-rendering: auto; }
        #ui-overlay { position: absolute; background: rgba(15, 23, 42, 0.98); padding: 40px; border-radius: 20px; text-align: center; z-index: 2000; border: 2px solid #38bdf8; min-width: 300px; }
        .btn-start { background: #38bdf8; color: #0f172a; border: none; padding: 15px 40px; font-size: 1.25rem; font-weight: bold; border-radius: 10px; cursor: pointer; margin-top: 20px; }
        .btn-start:disabled { background: #1e293b; color: #475569; cursor: wait; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="ui-overlay">
        <h1 style="color:#38bdf8; margin-top:0;">Kutup Maceraları</h1>
        <p id="status-msg" style="color:#94a3b8;">Sistem ve görseller hazırlanıyor...</p>
        <button id="start-button" class="btn-start" disabled>LÜTFEN BEKLEYİN...</button>
    </div>

    <canvas class="emscripten" id="canvas" width="1000" height="650" oncontextmenu="event.preventDefault()" tabindex="1"></canvas>

    <script type="application/javascript">
        // Cross-origin hatasını önlemek için yama
        if (!window.blanker) window.blanker = {};

        window.config = {
            archive: "kutup.maceralari", 
            gui_debug: 3,
            fb_width: 1000,
            fb_height: 650,
            _sdl2: "canvas",
            cdn: "https://pygame-web.github.io/cdn/0.9.3/",
            ume_block: 1 
        };

        const startButton = document.getElementById('start-button');
        const statusMsg = document.getElementById('status-msg');
        const overlay = document.getElementById('ui-overlay');
        const canvas = document.getElementById('canvas');

        // Python tarafı hazır olunca butonu aç
        function custom_postrun() {
            startButton.innerText = "OYUNA BAŞLA";
            startButton.disabled = false;
            statusMsg.innerText = "Macera hazır!";
        }

        startButton.onclick = function() {
            overlay.classList.add('hidden');
            canvas.style.display = "block";
            canvas.focus();
            if (window.MM) window.MM.UME = true;
        };
    </script>
</body>
</html>
